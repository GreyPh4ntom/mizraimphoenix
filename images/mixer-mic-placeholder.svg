<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1a1a1a"/>
  <!-- Mixer body -->
  <rect x="60" y="120" width="160" height="160" rx="8" fill="#2a2a2a" stroke="#fceba2" stroke-width="2"/>
  <!-- Mixer knobs -->
  <g fill="#0f0f0f" stroke="#3a3a3a" stroke-width="1">
    <circle cx="100" cy="160" r="18"/>
    <circle cx="140" cy="160" r="18"/>
    <circle cx="180" cy="160" r="18"/>
    <circle cx="100" cy="220" r="18"/>
    <circle cx="140" cy="220" r="18"/>
    <circle cx="180" cy="220" r="18"/>
  </g>
  <!-- Knob indicators -->
  <g fill="#fceba2" opacity="0.8">
    <circle cx="100" cy="150" r="3"/>
    <circle cx="140" cy="150" r="3"/>
    <circle cx="180" cy="150" r="3"/>
    <circle cx="100" cy="210" r="3"/>
    <circle cx="140" cy="210" r="3"/>
    <circle cx="180" cy="210" r="3"/>
  </g>
  <!-- Microphone -->
  <rect x="280" y="100" width="50" height="120" rx="25" fill="#2a2a2a" stroke="#fceba2" stroke-width="2"/>
  <rect x="295" y="220" width="20" height="60" fill="#3a3a3a"/>
  <rect x="260" y="275" width="80" height="10" rx="5" fill="#3a3a3a"/>
  <!-- Mic grille lines -->
  <g stroke="#0f0f0f" stroke-width="1" opacity="0.5">
    <line x1="285" y1="115" x2="325" y2="115"/>
    <line x1="285" y1="130" x2="325" y2="130"/>
    <line x1="285" y1="145" x2="325" y2="145"/>
    <line x1="285" y1="160" x2="325" y2="160"/>
    <line x1="285" y1="175" x2="325" y2="175"/>
    <line x1="285" y1="190" x2="325" y2="190"/>
  </g>
  <!-- Labels -->
  <text x="140" y="340" font-family="Orbitron, sans-serif" font-size="16" font-weight="700" fill="#fceba2" text-anchor="middle" letter-spacing="2">MIXER</text>
  <text x="305" y="340" font-family="Orbitron, sans-serif" font-size="16" font-weight="700" fill="#fceba2" text-anchor="middle" letter-spacing="2">MIC</text>
</svg>