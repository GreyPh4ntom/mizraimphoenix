<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#1a1a1a"/>
  <!-- Monitor screen -->
  <rect x="60" y="60" width="280" height="200" rx="8" fill="#2a2a2a" stroke="#fceba2" stroke-width="3"/>
  <rect x="75" y="75" width="250" height="170" fill="#0f0f0f"/>
  <!-- Screen content -->
  <rect x="90" y="90" width="220" height="140" fill="url(#monitor-grad)"/>
  <defs>
    <linearGradient id="monitor-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Monitor stand -->
  <rect x="180" y="260" width="40" height="60" fill="#3a3a3a"/>
  <rect x="140" y="310" width="120" height="12" rx="6" fill="#3a3a3a"/>
  <!-- Label -->
  <text x="200" y="370" font-family="Orbitron, sans-serif" font-size="20" font-weight="700" fill="#fceba2" text-anchor="middle" letter-spacing="3">MONITOR</text>
</svg>